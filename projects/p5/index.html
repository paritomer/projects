<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>InternConnect - Internship Application Form</h2>

    <form method="post">

        <fieldset>
            <legend>Personal Information</legend>

            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   pattern="[0-9]{10}"
                   placeholder="10-digit number"><br><br>

            <label for="dob">Date of Application:</label><br>
            <input type="date" id="dob" name="dob"><br><br>
        </fieldset>

        <fieldset>
            <legend>Internship Details</legend>

            <label>Preferred Role:</label><br>

            <input type="radio" id="web" name="role" value="Web Development">
            <label for="web">Web Development</label>

            <input type="radio" id="java" name="role" value="Java Developer">
            <label for="java">Java Developer</label>

            <input type="radio" id="data" name="role" value="Data Analyst">
            <label for="data">Data Analyst</label>

            <br><br>

            <label for="skill">Skill Level (1-10):</label><br>
            <input type="range" id="skill" name="skill" min="1" max="10">
            <br><br>

            <label for="technology">Preferred Technology:</label><br>
            <input list="technologies" id="technology" name="technology">

            <datalist id="technologies">
                <option value="HTML">
                <option value="CSS">
                <option value="JavaScript">
                <option value="Java">
                <option value="Python">
            </datalist>

            <br><br>

            <label for="about">Why do you want this internship?</label><br>
            <textarea id="about" name="about" rows="5" cols="40"></textarea>
            <br><br>
        </fieldset>

        <button type="submit">Submit Application</button>

    </form>

</body>
</html>
